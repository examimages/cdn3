<svg width="272" height="252" xmlns="http://www.w3.org/2000/svg">
  <svg viewBox="40 120 620 460" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for markers if needed, though none are used here as per sketch -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
      </marker>
    </defs>

    <!-- Triangle ABC -->
    <polygon points="280,188 100,500 580,500" fill="none" stroke="#000000" stroke-width="2" />

    <!-- Angle Arc at Vertex B -->
    <path d="M 160,500 A 60,60 0 0 0 130,448" fill="none" stroke="#000000" stroke-width="2" />

    <!-- Vertex Labels -->
    <text x="280" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px">A</text>
    <text x="70" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px">B</text>
    <text x="610" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px">C</text>

    <!-- Side Length Labels -->
    <!-- Side BC: 12 cm -->
    <text x="340" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px">12 cm</text>
    
    <!-- Side AB: 9 cm (rotated to align with the side) -->
    <text x="155" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px" transform="rotate(-60, 155, 330)">9 cm</text>

    <!-- Angle Label: θ -->
    <text x="135" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="30px">θ</text>
  </svg>
</svg>