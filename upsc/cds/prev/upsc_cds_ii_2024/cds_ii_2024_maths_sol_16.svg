<svg width="392" height="218" xmlns="http://www.w3.org/2000/svg">
  <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="560" fill="#ffffff" />
    
    <!-- Table Grid -->
    <rect x="0" y="0" width="900" height="560" fill="none" stroke="#000000" stroke-width="2" />
    
    <!-- Horizontal Lines -->
    <line x1="0" y1="80" x2="900" y2="80" stroke="#000000" stroke-width="2" />
    <line x1="0" y1="160" x2="900" y2="160" stroke="#000000" stroke-width="2" />
    <line x1="0" y1="240" x2="900" y2="240" stroke="#000000" stroke-width="2" />
    <line x1="0" y1="320" x2="900" y2="320" stroke="#000000" stroke-width="2" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#000000" stroke-width="2" />
    <line x1="0" y1="480" x2="900" y2="480" stroke="#000000" stroke-width="2" />
    
    <!-- Vertical Lines -->
    <line x1="150" y1="0" x2="150" y2="560" stroke="#000000" stroke-width="2" />
    <line x1="300" y1="0" x2="300" y2="560" stroke="#000000" stroke-width="2" />
    <line x1="450" y1="0" x2="450" y2="560" stroke="#000000" stroke-width="2" />
    <line x1="600" y1="0" x2="600" y2="560" stroke="#000000" stroke-width="2" />
    <line x1="750" y1="0" x2="750" y2="560" stroke="#000000" stroke-width="2" />

    <!-- Text Styling -->
    <style>
      text {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 30px;
        fill: #000000;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .header {
        font-weight: bold;
      }
    </style>

    <!-- Header Row -->
    <text x="225" y="40" class="header">0°</text>
    <text x="375" y="40" class="header">30°</text>
    <text x="525" y="40" class="header">45°</text>
    <text x="675" y="40" class="header">60°</text>
    <text x="825" y="40" class="header">90°</text>

    <!-- Sin Row -->
    <text x="75" y="120" class="header">sin</text>
    <text x="225" y="120">0</text>
    <text x="375" y="120">1/2</text>
    <text x="525" y="120">1/√2</text>
    <text x="675" y="120">√3/2</text>
    <text x="825" y="120">1</text>

    <!-- Cos Row -->
    <text x="75" y="200" class="header">cos</text>
    <text x="225" y="200">1</text>
    <text x="375" y="200">√3/2</text>
    <text x="525" y="200">1/√2</text>
    <text x="675" y="200">1/2</text>
    <text x="825" y="200">0</text>

    <!-- Tan Row -->
    <text x="75" y="280" class="header">tan</text>
    <text x="225" y="280">0</text>
    <text x="375" y="280">1/√3</text>
    <text x="525" y="280">1</text>
    <text x="675" y="280">√3</text>
    <text x="825" y="280">∞</text>

    <!-- Cosec Row -->
    <text x="75" y="360" class="header">cosec</text>
    <text x="225" y="360">∞</text>
    <text x="375" y="360">2</text>
    <text x="525" y="360">√2</text>
    <text x="675" y="360">2/√3</text>
    <text x="825" y="360">1</text>

    <!-- Sec Row -->
    <text x="75" y="440" class="header">sec</text>
    <text x="225" y="440">1</text>
    <text x="375" y="440">2/√3</text>
    <text x="525" y="440">√2</text>
    <text x="675" y="440">2</text>
    <text x="825" y="440">∞</text>

    <!-- Cot Row -->
    <text x="75" y="520" class="header">cot</text>
    <text x="225" y="520">∞</text>
    <text x="375" y="520">√3</text>
    <text x="525" y="520">1</text>
    <text x="675" y="520">1/√3</text>
    <text x="825" y="520">0</text>
  </svg>
</svg>